name: Winuxsh Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Winuxsh tag to release, for example v0.7.1"
        required: true
        type: string
      winuxcmd_tag:
        description: "WinuxCmd tag to bundle; leave empty for latest release"
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: stable

jobs:
  build-windows:
    name: build-windows (${{ matrix.arch }})
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            rust_target: x86_64-pc-windows-msvc
            winuxcmd_asset_pattern: "WinuxCmd-*-win-x64.zip"
          - arch: arm64
            rust_target: aarch64-pc-windows-msvc
            winuxcmd_asset_pattern: "WinuxCmd-*-win-arm64.zip"

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Resolve release inputs
        id: release
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Invalid release tag '$tag'"
          }
          $version = $tag.Substring(1)
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Preserve current release packager
        shell: pwsh
        run: Copy-Item -LiteralPath scripts/package-release.ps1 -Destination (Join-Path $env:RUNNER_TEMP "package-release.ps1") -Force

      - name: Checkout release tag
        shell: pwsh
        run: |
          git fetch --tags --force
          git checkout "${{ steps.release.outputs.tag }}"
          Copy-Item -LiteralPath (Join-Path $env:RUNNER_TEMP "package-release.ps1") -Destination scripts/package-release.ps1 -Force

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.11
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Install Rust target
        run: rustup target add ${{ matrix.rust_target }}

      - name: Build winuxsh
        run: cargo build --locked --release --target ${{ matrix.rust_target }}

      - name: Download architecture-matched WinuxCmd release
        id: winuxcmd
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $repo = "unixwin/WinuxCmd"
          $requestedTag = ""
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $requestedTag = "${{ inputs.winuxcmd_tag }}"
          }
          if ([string]::IsNullOrWhiteSpace($requestedTag)) {
            $releaseJson = gh release view --repo $repo --json tagName,assets | ConvertFrom-Json
          } else {
            $releaseJson = gh release view $requestedTag --repo $repo --json tagName,assets | ConvertFrom-Json
          }
          $asset = $releaseJson.assets |
            Where-Object { $_.name -like "${{ matrix.winuxcmd_asset_pattern }}" } |
            Select-Object -First 1
          if (-not $asset) {
            throw "No WinuxCmd asset matched ${{ matrix.winuxcmd_asset_pattern }} in $($releaseJson.tagName)"
          }

          $downloadDir = Join-Path $env:RUNNER_TEMP "winuxcmd-${{ matrix.arch }}"
          New-Item -ItemType Directory -Force -Path $downloadDir | Out-Null
          gh release download $releaseJson.tagName --repo $repo --pattern $asset.name --dir $downloadDir

          $extractDir = Join-Path $downloadDir "extract"
          Expand-Archive -LiteralPath (Join-Path $downloadDir $asset.name) -DestinationPath $extractDir -Force
          $winuxcmdExe = Get-ChildItem -LiteralPath $extractDir -Recurse -Filter winuxcmd.exe |
            Select-Object -First 1
          if (-not $winuxcmdExe) {
            throw "winuxcmd.exe not found in $($asset.name)"
          }

          "tag=$($releaseJson.tagName)" >> $env:GITHUB_OUTPUT
          "asset=$($asset.name)" >> $env:GITHUB_OUTPUT
          "exe=$($winuxcmdExe.FullName)" >> $env:GITHUB_OUTPUT

      - name: Package release zip
        shell: pwsh
        run: |
          ./scripts/package-release.ps1 `
            -Version "${{ steps.release.outputs.version }}" `
            -WinuxCmdPath "${{ steps.winuxcmd.outputs.exe }}" `
            -Configuration release `
            -Target "${{ matrix.rust_target }}" `
            -Arch "${{ matrix.arch }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: winuxsh-v${{ steps.release.outputs.version }}-win-${{ matrix.arch }}
          path: dist/winuxsh-v${{ steps.release.outputs.version }}-win-${{ matrix.arch }}.zip
          if-no-files-found: error
          retention-days: 1

  release:
    runs-on: ubuntu-latest
    needs: build-windows
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Resolve release inputs
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${{ github.ref_name }}"
          fi
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: Winuxsh ${{ steps.release.outputs.tag }}
          body: |
            Winuxsh ${{ steps.release.outputs.tag }} Windows packages.

            Packages are built remotely for x64 and ARM64, and each zip bundles the matching WinuxCmd release binary under `winuxcmd/` for isolated shell use.
          files: artifacts/**/*.zip
          fail_on_unmatched_files: true
          overwrite_files: true
          generate_release_notes: true
