command = "git"
description = "the stupid content tracker"

[[flags]]
short = "-v"
long = "--version"
description = "print git version"

[[flags]]
short = "-h"
long = "--help"
description = "show help"

[[flags]]
short = "-C"
description = "run as if git was started in given path"
takes_value = true

[[flags]]
short = "-c"
description = "set config option (key=value)"
takes_value = true

[[flags]]
long = "--exec-path"
description = "path where git executables live"
takes_value = true

[[flags]]
long = "--git-dir"
description = "set the .git directory path"
takes_value = true

[[flags]]
long = "--work-tree"
description = "set the working tree path"
takes_value = true

[[flags]]
long = "--namespace"
description = "set the git namespace"
takes_value = true

[[flags]]
long = "--no-pager"
description = "do not pipe git output into a pager"

[[flags]]
long = "--no-replace-objects"
description = "do not use replacement refs to replace git objects"

[[flags]]
long = "--literal-pathspecs"
description = "treat pathspecs literally"

[[flags]]
long = "--glob-pathspecs"
description = "treat pathspecs as globs"

[[flags]]
long = "--no-glob-pathspecs"
description = "do not treat pathspecs as globs"

[[flags]]
long = "--icase-pathspecs"
description = "match pathspecs case-insensitively"

[[subcommands]]
name = "add"
description = "add file contents to the index"

[[subcommands.flags]]
short = "-A"
long = "--all"
description = "add changes from all tracked and untracked files"

[[subcommands.flags]]
short = "-u"
long = "--update"
description = "update tracked files only"

[[subcommands.flags]]
short = "-p"
long = "--patch"
description = "interactively choose hunks to stage"

[[subcommands.flags]]
short = "-v"
long = "--verbose"
description = "be verbose"

[[subcommands.flags]]
short = "-f"
long = "--force"
description = "allow adding otherwise ignored files"

[[subcommands.flags]]
short = "-n"
long = "--dry-run"
description = "do not actually add the files"

[[subcommands]]
name = "commit"
description = "record changes to the repository"

[[subcommands.flags]]
short = "-m"
long = "--message"
description = "commit message"
takes_value = true

[[subcommands.flags]]
short = "-a"
long = "--all"
description = "commit all changed files"

[[subcommands.flags]]
short = "--amend"
description = "amend the previous commit"

[[subcommands.flags]]
short = "-v"
long = "--verbose"
description = "show what would be committed"

[[subcommands.flags]]
short = "-s"
long = "--signoff"
description = "add a Signed-off-by trailer"

[[subcommands.flags]]
long = "--no-verify"
description = "bypass pre-commit hooks"

[[subcommands.flags]]
short = "-F"
long = "--file"
description = "read message from file"
takes_value = true

[[subcommands]]
name = "push"
description = "update remote refs along with associated objects"

[[subcommands.flags]]
short = "-f"
long = "--force"
description = "force update the branch"

[[subcommands.flags]]
long = "--force-with-lease"
description = "force update only if remote ref matches expectation"

[[subcommands.flags]]
short = "-u"
long = "--set-upstream"
description = "set upstream for the branch"

[[subcommands.flags]]
short = "-d"
long = "--delete"
description = "delete remote ref"

[[subcommands.flags]]
short = "--dry-run"
description = "do not actually push"

[[subcommands.flags]]
short = "-v"
long = "--verbose"
description = "be verbose"

[[subcommands]]
name = "pull"
description = "fetch from and integrate with another repository"

[[subcommands.flags]]
short = "-r"
long = "--rebase"
description = "rebase the local commits on top of the fetched ones"

[[subcommands.flags]]
long = "--no-rebase"
description = "do not rebase, merge instead"

[[subcommands.flags]]
long = "--ff-only"
description = "fast-forward only"

[[subcommands.flags]]
short = "-v"
long = "--verbose"
description = "be verbose"

[[subcommands]]
name = "fetch"
description = "download objects and refs from another repository"

[[subcommands.flags]]
short = "-a"
long = "--all"
description = "fetch all remotes"

[[subcommands.flags]]
short = "-p"
long = "--prune"
description = "prune remote-tracking branches no longer on remote"

[[subcommands.flags]]
long = "--tags"
description = "fetch all tags"

[[subcommands]]
name = "checkout"
description = "switch branches or restore working tree files"

[[subcommands.flags]]
short = "-b"
description = "create and checkout a new branch"

[[subcommands.flags]]
short = "-B"
description = "create and checkout a new branch (reset if exists)"

[[subcommands.flags]]
long = "--track"
description = "set up upstream tracking"

[[subcommands.flags]]
short = "-f"
long = "--force"
description = "force checkout"

[[subcommands]]
name = "switch"
description = "switch branches"

[[subcommands.flags]]
short = "-c"
description = "create and switch to a new branch"

[[subcommands.flags]]
short = "-C"
description = "create/reset and switch to a branch"

[[subcommands.flags]]
long = "--detach"
description = "switch to a commit for inspection"

[[subcommands.flags]]
short = "-t"
long = "--track"
description = "set up upstream tracking"

[[subcommands]]
name = "branch"
description = "list, create, or delete branches"

[[subcommands.flags]]
short = "-a"
long = "--all"
description = "list both remote and local branches"

[[subcommands.flags]]
short = "-r"
long = "--remotes"
description = "list remote-tracking branches"

[[subcommands.flags]]
short = "-d"
description = "delete a branch"

[[subcommands.flags]]
short = "-D"
description = "delete a branch (force)"

[[subcommands.flags]]
short = "-m"
long = "--move"
description = "rename a branch"

[[subcommands.flags]]
short = "-v"
long = "--verbose"
description = "show sha1 and commit subject"

[[subcommands]]
name = "merge"
description = "join two or more development histories together"

[[subcommands.flags]]
long = "--no-ff"
description = "create a merge commit even when fast-forward is possible"

[[subcommands.flags]]
long = "--ff-only"
description = "fast-forward only"

[[subcommands.flags]]
short = "-s"
long = "--strategy"
description = "merge strategy"

[[subcommands.flags]]
short = "-m"
description = "merge commit message"
takes_value = true

[[subcommands.flags]]
long = "--abort"
description = "abort the current merge"

[[subcommands]]
name = "rebase"
description = "reapply commits on top of another base tip"

[[subcommands.flags]]
short = "--abort"
description = "abort and return to original branch"

[[subcommands.flags]]
short = "--continue"
description = "continue after resolving conflicts"

[[subcommands.flags]]
short = "-i"
long = "--interactive"
description = "interactive rebase"

[[subcommands.flags]]
long = "--onto"
description = "rebase onto specified base"
takes_value = true

[[subcommands]]
name = "reset"
description = "reset current HEAD to the specified state"

[[subcommands.flags]]
long = "--hard"
description = "reset HEAD, index and working tree"

[[subcommands.flags]]
long = "--soft"
description = "reset HEAD only"

[[subcommands.flags]]
long = "--mixed"
description = "reset HEAD and index"

[[subcommands.flags]]
long = "--keep"
description = "keep local changes"

[[subcommands]]
name = "status"
description = "show the working tree status"

[[subcommands.flags]]
short = "-s"
long = "--short"
description = "give output in short format"

[[subcommands.flags]]
short = "-b"
long = "--branch"
description = "show branch information"

[[subcommands.flags]]
long = "--porcelain"
description = "machine-readable output"

[[subcommands.flags]]
long = "--long"
description = "give output in long format (default)"

[[subcommands]]
name = "log"
description = "show commit logs"

[[subcommands.flags]]
long = "--oneline"
description = "abbreviated format"

[[subcommands.flags]]
long = "--graph"
description = "show ascii graph"

[[subcommands.flags]]
long = "--decorate"
description = "show ref names of commits"

[[subcommands.flags]]
short = "-p"
long = "--patch"
description = "show diffs"

[[subcommands.flags]]
long = "--stat"
description = "show diffstat of changes"

[[subcommands]]
name = "diff"
description = "show changes between commits and working tree"

[[subcommands.flags]]
long = "--staged"
description = "diff staged changes"

[[subcommands.flags]]
short = "--cached"
description = "alias of --staged"

[[subcommands.flags]]
short = "-p"
long = "--patch"
description = "show patch"

[[subcommands.flags]]
long = "--name-only"
description = "show only names of changed files"

[[subcommands.flags]]
long = "--stat"
description = "show diffstat"

[[subcommands]]
name = "init"
description = "create an empty git repository"

[[subcommands.flags]]
long = "--bare"
description = "create a bare repository"

[[subcommands.flags]]
long = "--template"
description = "use template directory"
takes_value = true

[[subcommands.flags]]
short = "-b"
long = "--initial-branch"
description = "initial branch name"
takes_value = true

[[subcommands]]
name = "clone"
description = "clone a repository into a new directory"

[[subcommands.flags]]
long = "--depth"
description = "shallow clone depth"
takes_value = true

[[subcommands.flags]]
long = "--recursive"
description = "initialize submodules"

[[subcommands.flags]]
short = "-b"
long = "--branch"
description = "checkout specific branch"
takes_value = true

[[subcommands.flags]]
long = "--mirror"
description = "mirror clone"
