command = "mv"
description = "move or rename files"

[[flags]]
short = "-b"
description = "like --backup but does not accept an argument"

[[flags]]
short = "-f"
long = "--force"
description = "do not prompt before overwriting"

[[flags]]
short = "-i"
long = "--interactive"
description = "prompt before overwrite"

[[flags]]
short = "-I"
description = "prompt once before removing more than three files, or when moving recursively"

[[flags]]
short = "-n"
long = "--no-clobber"
description = "do not overwrite an existing file"

[[flags]]
long = "--strip-trailing-slashes"
description = "remove trailing slashes from each SOURCE argument"

[[flags]]
short = "-S"
long = "--suffix"
description = "override the usual backup suffix"
takes_value = true

[[flags]]
short = "-t"
long = "--target-directory"
description = "move all SOURCE arguments into DIRECTORY"
takes_value = true
values_from = "path"

[[flags]]
short = "-T"
long = "--no-target-directory"
description = "treat DEST as a normal file"

[[flags]]
short = "-u"
long = "--update"
description = "move only when SOURCE is newer or destination is missing"

[[flags]]
short = "-v"
long = "--verbose"
description = "explain what is being done"

[[flags]]
long = "--backup"
description = "make a backup of each existing destination file"
