command = "rm"
description = "remove files or directories"

[[flags]]
short = "-f"
long = "--force"
description = "ignore nonexistent files and arguments, never prompt"

[[flags]]
short = "-i"
description = "prompt before every removal"

[[flags]]
short = "-I"
description = "prompt once before removing more than three files, or when removing recursively"

[[flags]]
short = "-d"
long = "--dir"
description = "remove empty directories"

[[flags]]
short = "-r"
long = "--recursive"
description = "remove directories and their contents recursively"

[[flags]]
short = "-R"
long = "--recursive"
description = "remove directories and their contents recursively"

[[flags]]
short = "-v"
long = "--verbose"
description = "explain what is being done"

[[flags]]
long = "--interactive"
description = "prompt according to WHEN: never, once, or always"
takes_value = true
values = ["never", "once", "always"]

[[flags]]
long = "--one-file-system"
description = "skip directories on a different file system"

[[flags]]
long = "--no-preserve-root"
description = "do not treat / specially"

[[flags]]
long = "--preserve-root"
description = "do not remove /"
