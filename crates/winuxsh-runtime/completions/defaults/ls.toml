command = "ls"
description = "list directory contents"

[[flags]]
short = "-a"
long = "--all"
description = "do not ignore entries starting with ."

[[flags]]
short = "-A"
long = "--almost-all"
description = "do not list implied . and .."

[[flags]]
short = "-l"
long = "--long-list"
description = "use a long listing format"

[[flags]]
short = "-h"
long = "--human-readable"
description = "with -l and -s, print sizes like 1K 234M 2G etc."

[[flags]]
short = "-R"
long = "--recursive"
description = "list subdirectories recursively"

[[flags]]
short = "-r"
long = "--reverse"
description = "reverse order while sorting"

[[flags]]
short = "-d"
long = "--directory"
description = "list directories themselves, not their contents"

[[flags]]
short = "-F"
long = "--classify"
description = "append indicator (one of */=>@|) to entries"

[[flags]]
long = "--color"
description = "colorize the output; WHEN can be 'always', 'auto', or 'never'"
takes_value = true
values = ["always", "auto", "never"]

[[flags]]
long = "--sort"
description = "sort entries by WORD"
takes_value = true
values = ["none", "size", "time", "version", "extension"]

[[flags]]
long = "--format"
description = "set output format"
takes_value = true
values = ["across", "commas", "horizontal", "long", "single-column", "verbose", "vertical"]

[[flags]]
long = "--time"
description = "change time style"
takes_value = true
values = ["atime", "access", "use", "ctime", "status"]

[[flags]]
short = "-I"
long = "--ignore"
description = "ignore entries matching PATTERN"
takes_value = true

[[flags]]
short = "-w"
long = "--width"
description = "set output width to COLS. 0 means no limit"
takes_value = true

[[flags]]
short = "-1"
description = "list one file per line"
