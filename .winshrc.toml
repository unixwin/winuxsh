# Winuxsh Configuration File

[aliases]
ll = "ls -la"
la = "ls -a"
l = "ls -CF"

[completions]
# Directories containing <cmd>.toml or <cmd>.bash completion definitions
completion_dirs = [
    "D:/shellTools/ripgrep/complete",
    "D:/shellTools/fd/autocomplete",
    "D:/shellTools/bat/autocomplete",
]

[theme]
current_theme = "default"

[shell]
prompt_format = "{user}@{host} {cwd} {symbol}"

[winuxcmd]
# Override path to winuxcmd.exe (auto-detected from PATH if not set)
# path = "D:/tools/winuxcmd/winuxcmd.exe"
