<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">winuxsh</title>
  <desc id="desc">winuxsh terminal icon: a Unix-style >_ shell prompt framed by a Windows-style window, evoking a bash/zsh shell on Windows.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1f2a"/>
      <stop offset="1" stop-color="#0e2a3d"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7fd3e6"/>
      <stop offset="1" stop-color="#3aa7c2"/>
    </linearGradient>
    <linearGradient id="prompt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7CFFB2"/>
      <stop offset="1" stop-color="#3CE5C0"/>
    </linearGradient>
    <linearGradient id="titlebar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1a3d52"/>
      <stop offset="1" stop-color="#16323f"/>
    </linearGradient>

    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="112" ry="112" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="112" ry="112"
        fill="none" stroke="url(#frame)" stroke-width="6" opacity="0.55"/>

  <g filter="url(#soft)">
    <rect x="80" y="96" width="352" height="56" rx="18" fill="url(#titlebar)"/>
    <circle cx="118" cy="124" r="8"  fill="#ff8d6b"/>
    <circle cx="144" cy="124" r="8"  fill="#ffd166"/>
    <circle cx="170" cy="124" r="8"  fill="#7CFFB2"/>

    <rect x="80" y="152" width="352" height="280" rx="22"
          fill="#08151e" stroke="url(#frame)" stroke-width="4"/>
  </g>

  <g>
    <path d="M 132 206 L 226 254 L 132 302"
          fill="none" stroke="url(#prompt)" stroke-width="34"
          stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="350" y="272" width="64" height="36" rx="8" fill="url(#prompt)"/>
  </g>

  <g opacity="0.55">
    <line x1="132" y1="368" x2="380" y2="368" stroke="#3aa7c2" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
